name: Theme CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo Extended
        env:
          HUGO_VERSION: 0.164.0
        run: |
          curl -fsSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          tar -xzf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -C "$RUNNER_TEMP/hugo" hugo
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"

      - name: Build example site
        run: |
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --gc --minify --panicOnWarning

      - name: Build under subpath
        run: |
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --baseURL "https://example.com/preview/" --destination "$RUNNER_TEMP/subpath" --gc --minify --panicOnWarning

      - name: Validate search JSON
        run: jq empty exampleSite/public/search/index.json
