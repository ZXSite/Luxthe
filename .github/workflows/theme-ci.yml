name: Theme CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install Hugo Extended"
        env:
          HUGO_VERSION: 0.164.0
        run: |
          curl -fsSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          tar -xzf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -C "$RUNNER_TEMP/hugo" hugo
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"

      - name: "Build example site (multilingual)"
        run: >-
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE
          --gc --minify --panicOnWarning

      - name: "Build subpath"
        run: >-
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE
          --baseURL "https://example.com/preview/"
          --destination "$RUNNER_TEMP/subpath"
          --gc --minify --panicOnWarning

      - name: "Validate search JSON"
        run: jq empty exampleSite/public/search/index.json

      - name: "Check for javascript: URLs"
        run: |
          if grep -qr 'javascript:' exampleSite/public/ 2>/dev/null; then
            echo "SECURITY: javascript: URL found"
            exit 1
          fi
          echo "No javascript: URLs found"

      - name: "Check for onerror/onload attributes"
        run: |
          if grep -qrE '\bon(error|load)\s*=' exampleSite/public/ 2>/dev/null; then
            echo "SECURITY: event handler found"
            exit 1
          fi
          echo "No event handlers found"

      - name: "Check i18n key parity"
        run: |
          python3 -c "
          import tomllib, sys
          def flatten(v, p=''):
              if isinstance(v, dict):
                  if 'other' in v and all(not isinstance(x, dict) for x in v.values()):
                      return {p}
                  return set.union(*[flatten(c, f'{p}.{k}' if p else k) for k,c in v.items()]) if v else set()
              return {p}
          def load(path):
              with open(path, 'rb') as f:
                  return tomllib.load(f)
          zh = flatten(load('i18n/zh-cn.toml'))
          en = flatten(load('i18n/en.toml'))
          only_zh = zh-en; only_en = en-zh
          if only_zh or only_en:
              print('zh-only:', sorted(only_zh), 'en-only:', sorted(only_en))
              sys.exit(1)
          print(f'OK: {len(zh)} keys match')
          "

      - name: "Deterministic build check"
        run: |
          rm -rf "$RUNNER_TEMP/build-1" "$RUNNER_TEMP/build-2"
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --destination "$RUNNER_TEMP/build-1" --gc --minify
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --destination "$RUNNER_TEMP/build-2" --gc --minify
          diff -rq "$RUNNER_TEMP/build-1" "$RUNNER_TEMP/build-2" && echo "Builds identical"
