name: Theme CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: theme-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [zh, en]
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo Extended
        env:
          HUGO_VERSION: 0.164.0
        run: |
          curl -fsSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          tar -xzf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -C "$RUNNER_TEMP/hugo" hugo
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"

      - name: Build (${{ matrix.lang }})
        run: |
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --defaultContentLanguage "${{ matrix.lang }}" --gc --minify --panicOnWarning

      - name: Build subpath (${{ matrix.lang }})
        run: |
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --baseURL "https://example.com/preview/" --destination "$RUNNER_TEMP/subpath" --gc --minify --panicOnWarning

      - name: Validate search JSON
        run: jq empty exampleSite/public/search/index.json

      - name: "Check for javascript: URLs"
        run: |
          if grep -qr 'javascript:' exampleSite/public/; then
            echo "SECURITY: javascript: URL found in output"
            exit 1
          fi
          echo "No javascript: URLs found"

      - name: "Check for onerror/onload attributes"
        run: |
          if grep -qrE '\bon(error|load)\s*=' exampleSite/public/; then
            echo "SECURITY: event handler attribute found in output"
            exit 1
          fi
          echo "No event handler attributes found"

      - name: "Check internal fragments"
        run: |
          # Verify archive year- anchors exist
          grep -q 'id="year-' exampleSite/public/archives/index.html && echo "Archive anchors OK" || (echo "Missing year- anchors" && exit 1)

      - name: "Check i18n key parity"
        run: |
          python3 -c "
          import re, sys
          def get_keys(path):
              with open(path) as f: return set(re.findall(r'^\[?(\w+\.?\w*)\]', f.read(), re.M))
          zh = get_keys('i18n/zh-cn.toml')
          en = get_keys('i18n/en.toml')
          only_zh = zh - en
          only_en = en - zh
          if only_zh: print(f'Only in zh-cn: {only_zh}')
          if only_en: print(f'Only in en: {only_en}')
          sys.exit(1 if only_zh or only_en else 0)
          "

      - name: "Deterministic build check"
        run: |
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --destination "$RUNNER_TEMP/build-1" --gc --minify
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE --destination "$RUNNER_TEMP/build-2" --gc --minify
          diff -rq "$RUNNER_TEMP/build-1" "$RUNNER_TEMP/build-2" && echo "Builds identical"
