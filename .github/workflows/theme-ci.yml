name: Theme CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: "Install Hugo Extended"
        env:
          HUGO_VERSION: 0.164.0
        run: |
          curl --fail --retry 3 --connect-timeout 15 --max-time 120 -sSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "fea17b8c076f950bb2e9f9486667bdaa29422883888d509d63931c73e8a9b3a4  hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/hugo"
          tar -xzf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -C "$RUNNER_TEMP/hugo" hugo
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"

      - name: "Build example site (multilingual)"
        run: >-
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE
          --gc --minify --panicOnWarning

      - name: "Build subpath"
        run: >-
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE
          --baseURL "https://example.com/preview/"
          --destination "$RUNNER_TEMP/subpath"
          --gc --minify --panicOnWarning

      - name: "Validate search JSON"
        run: jq empty exampleSite/public/search/index.json

      - name: "Check for javascript: URLs"
        run: |
          if grep -qr 'javascript:' exampleSite/public/ 2>/dev/null; then
            echo "SECURITY: javascript: URL found"
            exit 1
          fi
          echo "No javascript: URLs found"

      - name: "Check for onerror/onload attributes"
        run: |
          if grep -qrE '\bon(error|load)\s*=' exampleSite/public/ 2>/dev/null; then
            echo "SECURITY: event handler found"
            exit 1
          fi
          echo "No event handlers found"

      - name: "Check i18n key parity"
        run: |
          python3 -c "
          import tomllib, sys
          def flatten(v, p=''):
              if isinstance(v, dict):
                  if 'other' in v and all(not isinstance(x, dict) for x in v.values()):
                      return {p}
                  return set.union(*[flatten(c, f'{p}.{k}' if p else k) for k,c in v.items()]) if v else set()
              return {p}
          def load(path):
              with open(path, 'rb') as f:
                  return tomllib.load(f)
          zh = flatten(load('i18n/zh-cn.toml'))
          en = flatten(load('i18n/en.toml'))
          only_zh = zh-en; only_en = en-zh
          if only_zh or only_en:
              print('zh-only:', sorted(only_zh), 'en-only:', sorted(only_en))
              sys.exit(1)
          print(f'OK: {len(zh)} keys match')
          "

      - name: "Language isolation assertions"
        run: |
          test ! -e exampleSite/public/en/posts/welcome/index.html || { echo "FAIL: zh ghost page leaked into /en/"; exit 1; }
          grep -q 'lang=en-US' exampleSite/public/en/posts/welcome-to-luxthe/index.html || { echo "FAIL: en article lang attr"; exit 1; }
          ! grep -q '"/en/' exampleSite/public/search/index.json || { echo "FAIL: zh search index contains /en/ pages"; exit 1; }
          echo "Language isolation OK"

      - name: "Widget/layout DOM assertions"
        run: |
          python3 - << 'PY'
          import glob, re, sys
          bad = []
          for f in glob.glob('exampleSite/public/**/*.html', recursive=True):
              html = open(f, encoding='utf-8', errors='ignore').read()
              with_w = 'layout-shell--with-widgets' in html
              has_aside = 'widget-sidebar' in html
              if with_w and not has_aside:
                  bad.append((f, 'with-widgets but no aside'))
              if not with_w and 'layout-shell--without-widgets' in html and has_aside:
                  bad.append((f, 'without-widgets but has aside'))
          for f in ('exampleSite/public/search/index.html', 'exampleSite/public/404.html'):
              html = open(f, encoding='utf-8', errors='ignore').read()
              if 'noindex' not in html:
                  bad.append((f, 'missing noindex'))
              if 'layout-shell--with-widgets' in html:
                  bad.append((f, 'special page has widget column'))
          if bad:
              print(bad); sys.exit(1)
          print('DOM assertions OK')
          PY


      - name: "Preset regression matrix"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/presets"

          # empty widgets
          cat > "$RUNNER_TEMP/presets/empty-widgets.toml" <<'CFG'
          [params.widgets]
          homepage = []
          page = []
          CFG
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE \
            --config hugo.toml,"$RUNNER_TEMP/presets/empty-widgets.toml" \
            --destination "$RUNNER_TEMP/presets/empty" \
            --gc --minify --panicOnWarning
          if grep -q 'widget-sidebar' "$RUNNER_TEMP/presets/empty/index.html"; then
            echo "FAIL: empty widgets gave aside"; exit 1;
          fi

          # avatar=none
          cat > "$RUNNER_TEMP/presets/avatar-none.toml" <<'CFG'
          [params.sidebar]
          avatar = "none"
          CFG
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE \
            --config hugo.toml,"$RUNNER_TEMP/presets/avatar-none.toml" \
            --destination "$RUNNER_TEMP/presets/avatar-none" \
            --gc --minify --panicOnWarning
          if grep -Eq 'site-avatar|site-logo--mobile' "$RUNNER_TEMP/presets/avatar-none/index.html"; then
            echo "FAIL: avatar not disabled"; exit 1;
          fi

          # showEmptyPresets
          cat > "$RUNNER_TEMP/presets/show-all.toml" <<'CFG'
          [params.sidebar.categories]
          showEmptyPresets = true
          CFG
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE \
            --config hugo.toml,"$RUNNER_TEMP/presets/show-all.toml" \
            --destination "$RUNNER_TEMP/presets/show-all" \
            --gc --minify --panicOnWarning
          grep -q '生活' "$RUNNER_TEMP/presets/show-all/index.html" || { echo "FAIL: empty presets not shown"; exit 1; }

          # showEmptyPresets=false: empty categories hidden
          cat > "$RUNNER_TEMP/presets/hide-empty.toml" <<'CFG'
          [params.sidebar.categories]
          showEmptyPresets = false
          CFG
          hugo --source exampleSite --themesDir ../.. --theme LuxTHE             --config hugo.toml,"$RUNNER_TEMP/presets/hide-empty.toml"             --destination "$RUNNER_TEMP/presets/hide-empty"             --gc --minify --panicOnWarning
          if grep -q '生活' "$RUNNER_TEMP/presets/hide-empty/index.html"; then
            echo "FAIL: empty presets visible when showEmptyPresets=false"
            exit 1
          fi
          echo "Preset matrix OK"

      - name: "Deterministic build check (5x)"
        run: |
          hashes="$RUNNER_TEMP/hashes.txt"; : > "$hashes"
          for n in 1 2 3 4 5; do
            dest="$RUNNER_TEMP/det-$n"; rm -rf "$dest"
            hugo --source exampleSite --themesDir ../.. --theme LuxTHE --destination "$dest" --gc --minify
            (cd "$dest" && find . -type f -print0 | sort -z | xargs -0 sha256sum) | sha256sum >> "$hashes"
          done
          count=$(cut -d' ' -f1 "$hashes" | sort -u | wc -l)
          cat "$hashes"
          test "$count" -eq 1 && echo "Deterministic: single hash" || { echo "FAIL: $count distinct hashes"; exit 1; }
