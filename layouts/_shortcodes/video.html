{{- $src := .Get "src" | default (.Get 0) -}}
<div class="video-wrapper">
    <video
        controls
        src="{{- $src -}}"
        {{ with .Get "poster" }}poster="{{- . -}}"{{ end }}
        {{ if eq (.Get "autoplay") "true" }}autoplay{{ end }}
        {{ if eq (.Get "muted") "true" }}muted{{ end }}
    >
        <p>{{ T "video.unsupported" }} <a href="{{- $src -}}">{{ T "video.fallbackLink" }}</a></p>
    
    </video>
</div>
