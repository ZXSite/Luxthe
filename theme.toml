name        = "LuxTHE"
version     = "3.3.0"
license     = "MIT"
licenselink = "https://github.com/ZXSite/LuxTHE/blob/main/LICENSE"
description = "A modern, Chinese-friendly card-style Hugo theme with responsive design"
homepage    = "https://github.com/ZXSite/LuxTHE"
tags        = ["blog", "responsive", "clean", "light", "dark", "chinese", "cards"]
features    = [
    "search",
    "dark mode",
    "table of contents",
    "responsive images",
    "rss",
    "i18n",
    "widget sidebar",
    "hamburger menu",
    "category tiles"
]
min_version = "0.164.0"

[author]
    name     = "LuxRex"
    homepage = "https://github.com/ZXSite"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.164.0"
[original]
    name = "Hugo Theme Stack"
    author = "Jimmy Cai"
    homepage = "https://jimmycai.com"
    repo = "https://github.com/CaiJimmy/hugo-theme-stack"