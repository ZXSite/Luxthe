baseURL = "https://example.com/"
title = "LuxTHE Example"
theme = "LuxTHE"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[languages.zh-cn]
  locale = "zh-CN"
  label = "简体中文"
  title = "LuxTHE 演示站"
  weight = 1

[languages.en]
  locale = "en-US"
  label = "English"
  title = "LuxTHE Demo"
  weight = 2

[pagination]
    pagerSize = 8

[outputs]
    home = ["HTML", "RSS"]

[permalinks]
    posts = "/posts/:slug/"

[params]
    mainSections = ["posts"]
    [params.sidebar]
        avatar = ""  # 留空=用主题自带默认头像; "none"=关闭; 或填自定义路径
        subtitle = "A modern Hugo theme"
        introduction = "在这里写一段站点简介，会以卡片形式显示在左侧栏。"
        email = "hi@example.com"
        telegram = "example_bot"
    [params.article]
        readingTime = true
    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "categories", params = { limit = 10 } },
            { type = "tag-cloud", params = { limit = 10 } },
            { type = "archives", params = { limit = 5 } },
        ]
        page = [{ type = "toc" }]
    [params.colorScheme]
        toggle = true
        default = "light"

[params.opengraph.twitter]
    card = "summary_large_image"